<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holysai - ร้านหูฟังคุณภาพ</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-100">
    <nav class="bg-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold text-blue-600">HOLYSAI</h1>
    </nav>

    <header class="bg-blue-800 text-white py-12 px-6 text-center">
        <h2 class="text-3xl font-bold mb-4">หูฟังคุณภาพดี ฟังสนุกทุกสไตล์</h2>
        <p class="mb-8">คัดสรรหูฟังที่ตอบโจทย์คุณที่สุด ในราคาที่เป็นกันเอง</p>
        <!-- รูปหลัก: หูฟังสีดำสุดหรู -->
        <img src="https://unsplash.com" class="mx-auto rounded-lg shadow-xl max-w-full h-auto mb-6" style="max-height: 400px;">
    </header>

    <section class="py-12 max-w-5xl mx-auto px-4">
        <h3 class="text-2xl font-bold mb-8 text-center">สินค้ายอดนิยม</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- สินค้า 1 -->
            <div class="bg-white p-4 rounded shadow">
                <img src="https://unsplash.com" class="rounded mb-4 w-full h-48 object-cover">
                <h4 class="font-bold">Holysai Wireless Pro</h4>
                <p class="text-blue-600 font-bold">฿3,590</p>
            </div>
            <!-- สินค้า 2 -->
            <div class="bg-white p-4 rounded shadow">
                <img src="https://unsplash.com" class="rounded mb-4 w-full h-48 object-cover">
                <h4 class="font-bold">Holysai Gamer G1</h4>
                <p class="text-blue-600 font-bold">฿2,290</p>
            </div>
            <!-- สินค้า 3 -->
            <div class="bg-white p-4 rounded shadow">
                <img src="https://unsplash.com" class="rounded mb-4 w-full h-48 object-cover">
                <h4 class="font-bold">Holysai Air Buds</h4>
                <p class="text-blue-600 font-bold">฿1,890</p>
            </div>
        </div>
    </section>

    <footer class="bg-white py-8 border-t text-center text-gray-500">
        <p>&copy; 2026 Holysai | <a href="#" class="underline">Privacy Policy</a></p>
        <p class="text-xs mt-2">ข้อมูลครบถ้วนสำหรับ Google Ads</p>
    </footer>
</body>
</html>
